<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - Tahsin Ahmed Fahim</title>
    <link rel="stylesheet" href="../css/contact.css">
</head>

<body>

    <header>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="educations.html">Education</a></li>
                <li><a href="experience.html">Experience</a></li>
                <li><a href="projects.html">Projects</a></li>
            </ul>
        </nav>

        <h1>Contact Me</h1>
        <h3>Let's Build Something Together</h3>
    </header>

    <main>
        <section>
            <form action="#" method="post">
                <fieldset>
                    <legend>Contact Form</legend>
                    
                    <table>
                        <tr>
                            <td><label for="fname">First Name:</label></td>
                            <td><input type="text" id="fname" placeholder="Enter your first name" name="fname" required></td>
                        </tr>

                        <tr>
                            <td><label for="lname">Last Name:</label></td>
                            <td><input type="text" id="lname" placeholder="Enter your last name" name="lname" required></td>
                        </tr>

                        <tr>
                            <td><label>Gender:</label></td>
                            <td>
                                <input type="radio" name="gender" value="male" required> Male
                                <input type="radio" name="gender" value="female"> Female
                            </td>
                        </tr>

                        <tr>
                            <td><label for="email">Email:</label></td>
                            <td><input type="email" id="email" placeholder="Enter your email" name="email" required></td>
                        </tr>

                        <tr>
                            <td><label for="company">Company:</label></td>
                            <td><input type="text" id="company" placeholder="Enter your company name" name="company"></td>
                        </tr>

                        <tr>
                            <td><label>Reason of Contact:</label></td>
                            <td>
                                <input type="radio" name="reason" value="projects" required> Projects
                                <input type="radio" name="reason" value="thesis"> Thesis
                                <input type="radio" name="reason" value="job"> Job
                            </td>
                        </tr>

                        <tr>
                            <td><label>Topics:</label></td>
                            <td>
                                <input type="checkbox" name="topic" value="web"> Web Development
                                <input type="checkbox" name="topic" value="mobile"> Mobile Development
                                <input type="checkbox" name="topic" value="ai"> AI/ML Development
                            </td>
                        </tr>

                        <tr>
                            <td><label for="date">Consultation Date:</label></td>
                            <td><input type="date" id="date" name="date" required></td>
                        </tr>

                        <tr>
                            <td></td>
                            <td>
                                <input type="submit" value="Submit">
                                <input type="reset" value="Reset">
                            </td>
                        </tr>
                    </table>
                </fieldset>
            </form>
        </section>
    </main>

    <footer>
        <nav>
            <ul>
                <li>
                    <a href="https://www.linkedin.com/in/tahsin-ahmed-fahim-5781453b3/" target="_blank">
                        <img src="../data/linkedin.png" alt="LinkedIn Profile" width="32">
                    </a>
                </li>
                <li>
                    <a href="https://github.com/CodeFahim" target="_blank">
                        <img src="../data/github.png" alt="GitHub Profile" width="32">
                    </a>
                </li>
            </ul>
        </nav>
    </footer>

</body>
</html>
